<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="portal_acesso.css">
    <title>GSports Portal de Acesso</title>
</head>
<body>
    <div class="logo_portal_acesso">
        <img src="assets/gsports_preto.png" alt="GSports Logo">
    </div>


    <h1 class="titulo_portal">Bem-vindo a Gsports!</h1>

    <h2 class="subtitulo_portal">Escolha seu portal de acesso!</h2>


    <div class="grid_escolha">
        <div class="escolha_aluno">
            <img class="img_portal_aluno" src="assets/portal aluno.png" alt="">

            <H1>ALUNO</H1>



        </div>


        <div class="escolha_professor">
            <img class="img_portal_professor" src="assets/portal professor.png" alt="">

            <h1>PROFESSOR</h1>


            
        </div>

            

        <div class="escolha_botoes">
            <a href=""><button class="botao_p_aluno">
                Entrar como Aluno
            </button>
            </a>

            <h1 class="ou"> Ou </h1>

            <a href=""><button class="botao_p_professor">
                Entrar como Professor
            </button>
            </a>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
