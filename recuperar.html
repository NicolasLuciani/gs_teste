<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="recuperar.css">
    <title>GSports Recuperar Senha</title>
</head>
<body>
    <canvas id="bg" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;"></canvas>
    
    <div class="voltar">
        <a href="javascript:history.back()">
            <i class="bi bi-arrow-left-circle-fill"></i>
        </a>
    </div>
    
    <div class="homem_foda">
        <img src="assets/musculoso.png" alt="">
    </div>
    <div class="container_recuperar">
        <div class="logo_gs">
            <img src="assets/gsports_branco.png" alt="">
        </div>




        <div class="email">
            <div class="email_i">
                <i class="bi bi-envelope"></i>
            </div>
            <input class="caixa_email" type="email" placeholder="Email">
        </div>


        <div class="botao_recuperar">
            <a href="login.html">
            <input class="recuperar" type="submit" value="Recuperar Senha">
            </a>
        </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
